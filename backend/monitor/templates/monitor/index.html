<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot Chat Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1e1e1e;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            text-align: center;
            width: 90%;
            max-width: 500px;
            border: 1px solid #333;
        }
        h1 { color: #00e676; margin-bottom: 5px; font-size: 1.8rem; }
        p.subtitle { color: #888; margin-bottom: 25px; font-size: 0.9rem; }
        
        .label { font-size: 0.8rem; color: #00e676; text-transform: uppercase; margin-bottom: 5px; text-align: left; width: 100%; }
        
        .message-box {
            font-size: 1.2rem;
            padding: 20px;
            background-color: #252525;
            border-radius: 12px;
            border: 1px solid #333;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            color: #fff;
            transition: 0.3s;
        }
        .message-box.updating { transform: scale(1.02); border-color: #00e676; }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        input {
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #2a2a2a;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        input:focus { border-color: #00e676; }
        
        button {
            padding: 15px;
            border-radius: 8px;
            border: none;
            background: #00e676;
            color: #000;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background: #00c853; transform: translateY(-2px); }
        button:active { transform: translateY(0); }

        .status {
            margin-top: 25px;
            font-size: 0.8rem;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Robot Chat</h1>
        <p class="subtitle">Live ROS 2 Communication</p>
        
        <div class="label">Robot is saying:</div>
        <div class="message-box" id="ros-message">
            Connecting...
        </div>
        
        <div class="controls">
            <div class="label">Ask the Robot:</div>
            <input type="text" id="cmd-input" placeholder="Type 'hi', 'status', or 'who are you'..." onkeypress="handleKey(event)">
            <button onclick="sendCommand()">Send Message</button>
        </div>

        <div class="status">
            Last Sync: <span id="last-update">--:--:--</span>
        </div>
    </div>

    <script>
        let lastMessage = "";

        function updateMessage() {
            fetch('/api/message/')
                .then(response => response.json())
                .then(data => {
                    const box = document.getElementById('ros-message');
                    if (data.message !== lastMessage) {
                        box.classList.add('updating');
                        setTimeout(() => box.classList.remove('updating'), 300);
                        lastMessage = data.message;
                    }
                    box.innerText = data.message;
                    document.getElementById('last-update').innerText = new Date().toLocaleTimeString();
                })
                .catch(error => console.error('Error fetching message:', error));
        }

        function sendCommand() {
            const input = document.getElementById('cmd-input');
            const text = input.value;
            if (!text) return;

            fetch('/api/send-command/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: text })
            })
            .then(response => response.json())
            .then(data => {
                input.value = '';
                // Optional: visual feedback for sent
            })
            .catch(error => console.error('Error sending command:', error));
        }

        function handleKey(e) {
            if (e.key === 'Enter') sendCommand();
        }

        setInterval(updateMessage, 1000);
        updateMessage();
    </script>
</body>
</html>
